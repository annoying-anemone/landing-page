---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "application.fullname" . }}-test-connection"
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "application.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox@sha256:9ae97d36d26566ff84e8893c64a6dc4fe8ca6d1144bf5b87b2b85a32def253c7
      command:
        - /bin/sh
        - -c
        - |
            echo "+ testing the application using wget"
            set -x
            wget -O /dev/null -q '{{ include "application.fullname" . }}:{{ .Values.service.port }}'
      resources:
        limits:
          cpu: "100m"
          memory: "128Mi"
        requests:
          cpu: "100m"
          memory: "128Mi"
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL      
      livenessProbe:
        exec:
          command:
            - /bin/sh
            - -c
            - "wget -q --spider '{{ include "application.fullname" . }}:{{ .Values.service.port }}'"
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        exec:
          command:
            - /bin/sh
            - -c
            - "wget -q --spider '{{ include "application.fullname" . }}:{{ .Values.service.port }}'"
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
  restartPolicy: Never
